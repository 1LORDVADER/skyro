<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT 33 • Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white p-8">
<div class="max-w-7xl mx-auto">
<h1 class="text-5xl font-semibold mb-2">VAULT 33</h1>
<p class="text-emerald-400 mb-8">Autonomous • Invisible • Secure</p>

<div class="grid grid-cols-1 md:grid-cols-5 gap-6" id="vaultGrid"></div>
</div>

<script>
const vaults = [
{ name: "Darius Production Vault", eb: "5 EB" },
{ name: "Test Vault 1", eb: "5 EB" },
{ name: "Test Vault 2", eb: "5 EB" },
{ name: "Test Vault 3", eb: "5 EB" },
{ name: "Test Vault 4", eb: "5 EB" },
{ name: "Test Vault 5", eb: "5 EB" },
{ name: "Test Vault 6", eb: "5 EB" },
{ name: "Test Vault 7", eb: "5 EB" },
{ name: "Test Vault 8", eb: "5 EB" },
{ name: "Test Vault 9", eb: "5 EB" }
];

function render() {
const grid = document.getElementById('vaultGrid');
grid.innerHTML = '';
vaults.forEach(v => {
const card = document.createElement('div');
card.className = "bg-zinc-900 rounded-3xl p-8 text-center cursor-pointer hover:bg-zinc-800";
card.innerHTML = `
<h2 class="text-xl mb-2">${v.name}</h2>
<div class="text-6xl font-bold text-emerald-400">${v.eb}</div>
<p class="text-zinc-400">Available • Max Capacity</p>
`;
grid.appendChild(card);
});
}
render();
</script>
</body>
</html>
