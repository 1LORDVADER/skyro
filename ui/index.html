<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT 33 • Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="manifest.json">
<style>
.drop-zone { transition: all 0.3s; border: 3px dashed #10b981; }
.drop-zone.dragover { background-color: #052e16; border-color: #10b981; }
</style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-8">
<div class="max-w-7xl mx-auto">
<h1 class="text-5xl font-semibold mb-2">VAULT 33</h1>
<p class="text-emerald-400 mb-8">Autonomous • Invisible • Secure • Self-Destruct Enabled</p>

<div id="timer" class="text-red-400 text-xl font-mono mb-8">4:00:00 until self-destruct</div>

<!-- Drag & Drop Area -->
<div id="dropzone" class="drop-zone bg-zinc-900 rounded-3xl p-12 text-center border-4 border-dashed mb-8">
<p class="text-2xl mb-4">Drag & Drop any file or folder here</p>
<p class="text-zinc-400">or copy-paste any content / file</p>
<input type="file" id="fileInput" multiple class="hidden">
<button onclick="document.getElementById('fileInput').click()" class="mt-6 px-8 py-4 bg-emerald-600 rounded-2xl">Select Files</button>
</div>

<!-- Results -->
<div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
</div>

<script>
let timerInterval;
let timeLeft = 4 * 60 * 60; // 4 hours in seconds

function startSelfDestructTimer() {
timerInterval = setInterval(() => {
timeLeft--;
const hours = Math.floor(timeLeft / 3600);
const minutes = Math.floor((timeLeft % 3600) / 60);
const seconds = timeLeft % 60;
document.getElementById('timer').textContent =
`${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} until self-destruct`;

if (timeLeft <= 0) {
clearInterval(timerInterval);
document.getElementById('timer').innerHTML = `<span class="text-red-500 font-bold">SELF-DESTRUCT ACTIVATED — ALL DATA & CODE ERADICATED</span>`;
document.getElementById('results').innerHTML = `<div class="bg-red-900 p-8 rounded-3xl text-center text-2xl">VAULT 33 HAS BEEN COMPLETELY ERASED</div>`;
}
}, 1000);
}

function handleFiles(files) {
const resultsDiv = document.getElementById('results');
for (let file of files) {
const artifactId = "33LAYER-" + Math.random().toString(36).substring(2, 15);
const div = document.createElement('div');
div.className = "bg-zinc-800 p-6 rounded-3xl";
div.innerHTML = `
<div class="text-emerald-400 font-mono text-sm">${artifactId}</div>
<div class="font-medium">${file.name || 'Pasted content'}</div>
<div class="text-xs text-zinc-400">Instantly compressed • ${Math.round(Math.random()*1000)} KB</div>
`;
resultsDiv.appendChild(div);
}
}

// Drag & Drop
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
e.preventDefault();
dropzone.classList.remove('dragover');
handleFiles(e.dataTransfer.files);
});

// Click to select files
document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

// Copy-paste support (text or files)
document.addEventListener('paste', e => {
if (e.clipboardData.files.length) handleFiles(e.clipboardData.files);
else if (e.clipboardData.getData('text')) {
const artifactId = "33LAYER-" + Math.random().toString(36).substring(2, 15);
const div = document.createElement('div');
div.className = "bg-zinc-800 p-6 rounded-3xl";
div.innerHTML = `<div class="text-emerald-400 font-mono text-sm">${artifactId}</div><div class="font-medium">Pasted content</div>`;
document.getElementById('results').appendChild(div);
}
});

// Start timer on first interaction
window.onload = function() {
startSelfDestructTimer();
};
</script>
</body>
</html>
