<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT 33 • Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="manifest.json">
</head>
<body class="bg-zinc-950 text-white min-h-screen p-8">
<div class="max-w-7xl mx-auto">
<h1 class="text-4xl font-semibold mb-2">VAULT 33</h1>
<p class="text-emerald-400 mb-8">Autonomous • Invisible • Secure</p>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="bg-zinc-900 rounded-3xl p-8">
<h2 class="text-xl">Total Reserved</h2>
<div class="text-6xl font-bold text-emerald-400">47.3 PB</div>
</div>
<div class="bg-zinc-900 rounded-3xl p-8">
<h2 class="text-xl">Allocated to Teams</h2>
<div>Engineering — 12.4 PB</div>
<div>Marketing — 8.1 PB</div>
</div>
<div class="bg-zinc-900 rounded-3xl p-8">
<h2 class="text-xl">Live Status</h2>
<div class="text-5xl font-bold text-emerald-400">ONLINE</div>
</div>
</div>

<div class="bg-zinc-900 rounded-3xl p-8 mt-8">
<h2 class="text-2xl mb-4">Data Explorer</h2>
<input type="text" id="search" placeholder="Search artifacts..." class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4 text-lg">
<div id="results" class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4"></div>
</div>
</div>
<script>
function loadDemo() {
document.getElementById('results').innerHTML = `
<div class="bg-zinc-800 p-6 rounded-3xl">Manufacturing CNC Blueprints • Ready</div>
<div class="bg-zinc-800 p-6 rounded-3xl">Sensor Telemetry • Ready</div>
`;
}
document.getElementById('search').addEventListener('input', loadDemo);
loadDemo();
</script>
</body>
</html>
